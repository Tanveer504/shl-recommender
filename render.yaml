services:
  - type: web
    name: shl-recommender
    env: python
    buildCommand: pip install -r requirements.txt && python build_index.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
